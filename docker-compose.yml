version: '3.8'

services:
  market-app:
    build:
      context: ./market-app
      dockerfile: Dockerfile
    container_name: market-app
    ports:
      - "8000:8000"
    volumes:
      - ./market-app:/app
      - ./data:/app/data
    environment:
      - DATABASE_PATH=/app/data/platform.db
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data: